<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eş Anlamlı Oyun PRO MAX</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #dfe6ee;
}

.kelime {
    font-size: 48px;
    font-weight: bold;
    margin: 30px;
}

.cevap {
    font-size: 28px;
    color: green;
    margin-top: 10px;
}

button {
    padding: 10px 15px;
    margin: 3px;
    font-size: 16px;
}

.buyuk {
    font-size: 22px;
    padding: 20px 40px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
}

.harfler {
    margin: 10px;
}

.harfler button {
    width: 40px;
    height: 40px;
}

.secili {
    background: #6ec6ff;
}
</style>
</head>

<body>

<h2>Eş Anlamlı Oyun PRO MAX 🎯</h2>

<div>
⭐ Puan: <span id="puan">0</span> |
❌ Yanlış: <span id="yanlis">0</span>
</div>

<br>

<div class="harfler" id="harfler"></div>

<div class="kelime" id="kelime"></div>
<div class="cevap" id="cevap"></div>

<button onclick="cevapGoster()">Cevabı Göster</button>
<br><br>

<button onclick="dogru()">✔️ Doğru</button>
<button onclick="yanlisCevap()">❌ Yanlış</button>
<button onclick="tekrarModu()">🧠 Yanlışları Tekrarla</button>

<br>

<button class="buyuk" onclick="yeniKelime()">➡️ Sonraki Kelime</button>

<script>

const tumKelimeler = [
["Acemi",["Toy"]],["Ad",["İsim"]],["Akıllı",["Uslu"]],
["Amaç",["Gaye","Hedef"]],["Anı",["Hatıra"]],["Anıt",["Abide"]],
["Anlam",["Mana"]],["Armağan",["Hediye"]],["Asır",["Yüzyıl"]],
["Basit",["Kolay"]],["Başvuru",["Müracaat"]],["Beyaz",["Ak"]],
["Biçim",["Şekil"]],["Buluş",["İcat"]],["Büyük",["İri"]],
["Cevap",["Yanıt"]],["Cümle",["Tümce"]],["Dert",["Üzüntü"]],
["Doğa",["Tabiat"]],["Doktor",["Hekim"]],["Dünya",["Yerküre"]],
["Düş",["Rüya"]],["Eksik",["Noksan"]],["Ev",["Konut"]],
["Fakir",["Yoksul"]],["Fayda",["Yarar"]],["Fiil",["Eylem"]],
["Gayret",["Çaba"]],["Gıda",["Besin"]],["Görev",["Vazife"]],
["Güç",["Kuvvet"]],

["Hakim",["Yargıç"]],["Hız",["Sürat"]],["Islak",["Yaş"]],
["İhtiyar",["Yaşlı"]],["Şehir",["Kent"]],["İlave",["Ek"]],
["İstek",["Arzu"]],["Kafa",["Baş"]],["Kalp",["Yürek"]],
["Kanun",["Yasa"]],["Kırmızı",["Al"]],["Kibar",["Nazik"]],
["Kişi",["Şahıs"]],["Kuşku",["Şüphe"]],["Macera",["Serüven"]],
["Medeni",["Uygar"]],["Mekan",["Yer"]],["Misafir",["Konuk"]],
["Nehir",["Irmak"]],["Okul",["Mektep"]],["Onarım",["Tamir"]],
["Ozan",["Şair"]],["Öğrenci",["Talebe"]],
["Öğretmen",["Muallim"]],["Öğüt",["Nasihat"]],
["Önder",["Lider"]],["Öneri",["Teklif"]],
["Önlem",["Tedbir"]],["Öykü",["Hikâye"]],
["Özen",["İtina"]],["Özlem",["Hasret"]],

["Özgürlük",["Hürriyet"]],["Problem",["Sorun"]],
["Rüzgâr",["Yel"]],["Sağlık",["Sıhhat"]],
["Savaş",["Harp","Cenk"]],["Sebep",["Neden"]],
["Sevinç",["Neşe"]],["Sınav",["İmtihan"]],
["Sınıf",["Derslik"]],["Siyah",["Kara"]],
["Sonbahar",["Güz"]],["Soru",["Sual"]],
["Sözcük",["Kelime"]],["Surat",["Yüz"]],
["Süratli",["Hızlı"]],["Şart",["Koşul"]],
["Tane",["Adet"]],["Tanık",["Şahit"]],
["Ulus",["Millet"]],["Uyarı",["İkaz"]],
["Uzak",["Irak"]],["Varlıklı",["Zengin"]],
["Veteriner",["Baytar"]],["Yaşam",["Hayat"]],
["Yemek",["Aş"]],["Yetenek",["Kabiliyet"]],
["Yıl",["Sene"]],["Yurt",["Vatan"]],
["Zaman",["Vakit"]],["Zayıf",["Cılız"]],
["Zelzele",["Deprem"]]
];

let aktifListe = [...tumKelimeler];
let aktifKelime;
let yanlislar = [];
let puan = 0;
let yanlis = 0;

// HARFLER
const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";

harfler.split("").forEach(harf => {
    let btn = document.createElement("button");
    btn.innerText = harf;

    btn.onclick = () => {
        document.querySelectorAll(".harfler button").forEach(b=>b.classList.remove("secili"));
        btn.classList.add("secili");

        aktifListe = tumKelimeler.filter(k => k[0].toUpperCase().startsWith(harf));
        yeniKelime();
    };

    document.getElementById("harfler").appendChild(btn);
});

// TÜMÜ
let tumBtn = document.createElement("button");
tumBtn.innerText = "Tümü";
tumBtn.onclick = () => {
    document.querySelectorAll(".harfler button").forEach(b=>b.classList.remove("secili"));
    aktifListe = [...tumKelimeler];
    yeniKelime();
};
document.getElementById("harfler").appendChild(tumBtn);

// OYUN
function yeniKelime() {
    aktifKelime = aktifListe[Math.floor(Math.random()*aktifListe.length)];
    document.getElementById("kelime").innerText = aktifKelime[0];
    document.getElementById("cevap").innerText = "";
}

function cevapGoster() {
    document.getElementById("cevap").innerText = aktifKelime[1].join(" / ");
}

function dogru() {
    puan++;
    guncelle();
    yeniKelime();
}

function yanlisCevap() {
    yanlis++;
    yanlislar.push(aktifKelime);
    guncelle();
    yeniKelime();
}

function tekrarModu() {
    if (yanlislar.length === 0) {
        alert("Yanlış yok");
        return;
    }
    aktifListe = [...yanlislar];
    yeniKelime();
}

function guncelle() {
    document.getElementById("puan").innerText = puan;
    document.getElementById("yanlis").innerText = yanlis;
}

yeniKelime();

</script>

</body>
</html>
