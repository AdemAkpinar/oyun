<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body {margin:0;font-family:Arial;background:#e9f2ff;}
.container {max-width:420px;margin:auto;background:white;min-height:100vh;padding:15px;}

.soru {font-size:28px;margin:25px 0;text-align:center;font-weight:bold;}

button {
width:100%;
padding:15px;
font-size:18px;
margin:6px 0;
border:none;
border-radius:10px;
}

.skor {text-align:center;margin:10px;}
</style>
</head>

<body>

<div class="container">

<h2>Quiz 🎯</h2>

<div class="skor">
⭐ <span id="puan">0</span>
</div>

<div class="soru" id="soru"></div>
<div id="secenekler"></div>

</div>

<script>

const kelimeler=[
["Acemi","Toy"],["Ad","İsim"],["Akıllı","Uslu"],
["Amaç","Gaye"],["Anı","Hatıra"],["Armağan","Hediye"],
["Basit","Kolay"],["Cevap","Yanıt"],["Dert","Üzüntü"],
["Doğa","Tabiat"],["Doktor","Hekim"],["Ev","Konut"],
["Fakir","Yoksul"],["Kalp","Yürek"],["Okul","Mektep"],
["Özgürlük","Hürriyet"],["Savaş","Harp"],["Ulus","Millet"],
["Zaman","Vakit"]
];

let puan=0, dogruCevap="";

function yeniSoru(){
let s=kelimeler[Math.floor(Math.random()*kelimeler.length)];
dogruCevap=s[1];
document.getElementById("soru").innerText=s[0];

let secenek=[dogruCevap];

while(secenek.length<4){
let r=kelimeler[Math.floor(Math.random()*kelimeler.length)][1];
if(!secenek.includes(r)) secenek.push(r);
}

secenek.sort(()=>Math.random()-0.5);

let alan=document.getElementById("secenekler");
alan.innerHTML="";

secenek.forEach(sec=>{
let b=document.createElement("button");
b.innerText=sec;
b.onclick=()=>kontrol(sec);
alan.appendChild(b);
});
}

function kontrol(sec){
if(sec===dogruCevap){puan++;alert("Doğru 🎉");}
else{alert("Yanlış ❌ Doğru: "+dogruCevap);}
document.getElementById("puan").innerText=puan;
yeniSoru();
}

yeniSoru();

</script>

</body>
</html>
